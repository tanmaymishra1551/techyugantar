<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c94fa"/>
      <stop offset="50%" stop-color="#4a6cf7"/>
      <stop offset="100%" stop-color="#3451e8"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Badge -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="url(#badgeGrad)" filter="url(#glow)"/>

  <!-- Glass sheen top half -->
  <rect x="2" y="2" width="96" height="46" rx="22" fill="white" opacity="0.1"/>

  <!-- Border stroke (subtle) -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>

  <!-- ── TY GLYPH ── -->
  <!-- Crossbar -->
  <rect x="13" y="16" width="74" height="13" rx="4.5" fill="white"/>
  <!-- Left fork -->
  <polygon points="50,29 38,29 14,90 27,90" fill="white"/>
  <!-- Right fork -->
  <polygon points="50,29 62,29 86,90 73,90" fill="white"/>
  <!-- Stem -->
  <rect x="43" y="70" width="14" height="24" rx="4" fill="white"/>
</svg>